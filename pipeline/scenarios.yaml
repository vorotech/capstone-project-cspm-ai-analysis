scenarios:
  - name: test_iam_red
    type: red
    rules:
      - ecc-aws-001-ensure_mfa_is_enabled_for_all_iam_users_with_console_password
      - ecc-aws-018-iam_users_receive_permissions_only_through_groups
      - ecc-aws-019-iam_password_policy_password_reuse

  - name: test_s3_red
    type: red
    rules:
      - ecc-aws-004-bucket_policy_allows_https_requests
      - ecc-aws-042-s3_encrypted_using_kms
      - ecc-aws-043-s3_bucket_lifecycle

  - name: test_s3_green
    type: green
    rules:
      - ecc-aws-004-bucket_policy_allows_https_requests
      - ecc-aws-042-s3_encrypted_using_kms

  - name: test_ec2_red
    type: red
    rules:
      - ecc-aws-020-instance_without_any_tag
      - ecc-aws-025-instance_without_termination_protection
      - ecc-aws-186-ec2_instance_no_public_ip

  - name: test_rds_red
    type: red
    rules:
      - ecc-aws-005-rds_not_open_to_large_scope
      - ecc-aws-026-rds_instance_with_no_backups
      - ecc-aws-127-rds_cluster_storage_is_encrypted
